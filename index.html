<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Daily Reports - MK Trading</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%); }
        .card { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .card:hover { background: rgba(255,255,255,0.08); transform: translateY(-2px); }
        .gold { color: #fbbf24; }
    </style>
</head>
<body class="gradient-bg text-white min-h-screen">
    <div class="max-w-4xl mx-auto px-6 py-12">

        <!-- Header -->
        <header class="text-center mb-12">
            <div class="text-6xl mb-4">₿</div>
            <h1 class="text-4xl font-bold mb-2">BTC Daily Reports</h1>
            <p class="text-gray-400">MK Trading | bitebiwang1413</p>
            <p class="text-sm text-gray-500 mt-2">自动更新于每天 10:30 (UTC+8)</p>
        </header>

        <!-- Reports List -->
        <section id="reports" class="space-y-4">
            <p class="text-center text-gray-500">加载中...</p>
        </section>

        <!-- Footer -->
        <footer class="text-center text-gray-500 text-sm mt-16 pt-8 border-t border-white/10">
            <p>数据来源: <a href="https://www.coingecko.com" class="text-blue-400 hover:underline">CoinGecko API</a></p>
            <p class="mt-2">本报告仅供参考，不构成投资建议 | © 2024 MK Trading</p>
        </footer>
    </div>

    <script>
        // 从reports目录读取日报列表
        const reports = [];
        let currentDate = new Date();

        // 生成最近30天的日期
        for (let i = 0; i < 30; i++) {
            const date = new Date(currentDate);
            date.setDate(date.getDate() - i);
            const dateStr = date.toISOString().split('T')[0].replace(/-/g, '');
            reports.push({
                date: date.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' }),
                filename: `reports/BTC_daily_${dateStr}.html`
            });
        }

        const container = document.getElementById('reports');
        container.innerHTML = '';

        reports.forEach(report => {
            const card = document.createElement('a');
            card.href = report.filename;
            card.className = 'card block rounded-xl p-4 transition-all duration-300';
            card.innerHTML = `
                <div class="flex items-center justify-between">
                    <div>
                        <div class="text-lg font-medium">${report.date}</div>
                        <div class="text-gray-500 text-sm">BTC Daily Report</div>
                    </div>
                    <div class="text-gray-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
                        </svg>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    </script>
</body>
</html>
