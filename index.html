<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC每日分析报告库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            line-height: 1.6;
            color: #1f2937;
            background: linear-gradient(135deg, #0a0e17 0%, #111827 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #1a2332;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            border: 1px solid #30363d;
        }
        
        .header {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .header .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-top: 10px;
        }
        
        .content {
            padding: 30px;
            background: #161b22;
        }
        
        .update-time {
            text-align: center;
            color: #8b949e;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #30363d;
        }
        
        .report-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .report-item {
            background: #21262d;
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #30363d;
            transition: all 0.2s;
        }
        
        .report-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
            border-color: #3b82f6;
        }
        
        .report-item.new {
            background: linear-gradient(135deg, rgba(59,130,246,0.15) 0%, rgba(139,92,246,0.15) 100%);
            border: 2px solid #3b82f6;
        }
        
        .report-date {
            font-size: 1.1rem;
            font-weight: 600;
            color: #60a5fa;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .report-date.new::after {
            content: "NEW";
            background: #10b981;
            color: white;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 12px;
        }
        
        .report-link {
            display: inline-block;
            background: #3b82f6;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 10px;
            transition: background 0.2s;
        }
        
        .report-link:hover {
            background: #2563eb;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: #8b949e;
            border-top: 1px solid #30363d;
            font-size: 0.9rem;
            background: #161b22;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #8b949e;
        }
        
        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>BTC每日分析报告库</h1>
            <div class="subtitle">
                专业的加密货币合约交易分析报告 | 自动化生成与更新
            </div>
        </div>
        
        <div class="content">
            <div class="update-time">
                最后更新: 2026-04-16 10:30:00 | 数据来源: CoinGecko + Binance
            </div>

            <div class="report-list" id="reportList">
                <!-- 报告列表将由JavaScript动态生成 -->
            </div>
            
        </div>
        
        <div class="footer">
            <p>报告库自动更新于: 2026-04-16 10:30:00</p>
            <p>2026 BTC每日分析系统 | 自动化维护</p>
            <p style="margin-top:8px;font-size:0.8rem;color:#6b7280;">数据来源: CoinGecko | Binance | CoinGlass</p>
        </div>
    </div>

<script>
// 报告列表数据 - 按日期倒序
const reports = [
    { date: '2026-04-16', file: 'BTC_daily_report_20260416.html', isNew: true },
    { date: '2026-04-15', file: 'BTC_daily_report_20260415.html', isNew: false },
    { date: '2026-04-14', file: 'BTC_daily_report_20260414.html', isNew: false },
    { date: '2026-04-13', file: 'BTC_daily_report_20260413.html', isNew: false },
];

// 生成报告列表
function renderReports() {
    const listContainer = document.getElementById('reportList');
    listContainer.innerHTML = reports.map(r => `
        <div class="report-item ${r.isNew ? 'new' : ''}">
            <div class="report-date ${r.isNew ? 'new' : ''}">
                ${r.date.replace(/-/g, '年').replace(/年(\d{2})年/, '年$1月').replace(/月(\d{2})$/, '月$1日')}
                ${r.isNew ? ' 最新报告' : ''}
            </div>
            <div style="color: #8b949e; margin-bottom: 10px;">
                BTC/ETH/SOL行情分析 | 合约数据 | 交易信号
            </div>
            <a href="reports/${r.file}" class="report-link" target="_blank">
                查看完整报告 →
            </a>
        </div>
    `).join('');
}

// 初始化
renderReports();
</script>
</body>
</html>
